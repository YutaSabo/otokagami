app = "otokagami-inference-staging"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PIPER_VOICE_US = "en_US-lessac-medium"
  PIPER_VOICE_DIR = "/opt/piper/voices/en_US-lessac-medium"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
